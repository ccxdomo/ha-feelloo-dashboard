title: Feelloo
views:
  - title: Carte
    path: map
    icon: mdi:map-marker-radius
    badges: []
    cards:
      - type: map
        aspect_ratio: '16:9'
        default_zoom: 18
        hours_to_show: 24
        entities:
          - entity: device_tracker.{cat_name}_name
        card_mod:
          style: |
            ha-card {
              border-radius: 24px !important;
              border: 1px solid var(--divider-color) !important;
              overflow: hidden !important;
            }

  - title: Chats
    path: cats
    icon: mdi:cat
    badges: []
    cards:
      - type: custom:auto-entities
        card:
          type: entities
          title: 🐱 Chats Feelloo
          state_color: true
        filter:
          include:
            - domain: device_tracker
              integration: feelloo
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: entities
          title: 🔋 Batteries
          state_color: true
        filter:
          include:
            - domain: sensor
              integration: feelloo
              entity_id: '*batterie*'
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: entities
          title: 📡 Signal
          state_color: true
        filter:
          include:
            - domain: sensor
              integration: feelloo
              entity_id: '*signal*'
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: entities
          title: 📍 Présence
          state_color: true
        filter:
          include:
            - domain: binary_sensor
              integration: feelloo
              entity_id: '*maison*'
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: entities
          title: 🐭 Petite Souris
          state_color: true
        filter:
          include:
            - domain: switch
              integration: feelloo
              entity_id: '*petite_souris*'
            - domain: number
              integration: feelloo
              entity_id: '*duree*'
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: entities
          title: 🔔 Actions
          state_color: true
        filter:
          include:
            - domain: button
              integration: feelloo
              entity_id: '*sonner*'
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: entities
          title: 📊 Activité
          state_color: true
        filter:
          include:
            - domain: sensor
              integration: feelloo
              entity_id:
                - '*activite*'
                - '*repos*'
                - '*calme*'
                - '*actif*'
                - '*sorties*'
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: entities
          title: ⚠️ Alertes
          state_color: true
        filter:
          include:
            - domain: binary_sensor
              integration: feelloo
              entity_id:
                - '*charge*'
                - '*batterie_faible*'
                - '*gateway*'
        sort:
          method: name
