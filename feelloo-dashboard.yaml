title: Feelloo
views:
  - title: Carte
    path: map
    icon: mdi:map-marker-radius
    badges: []
    cards:
      - type: map
        aspect_ratio: '16:9'
        default_zoom: 18
        hours_to_show: 24
        entities:
          - entity: device_tracker.{cat_name}_name
        card_mod:
          style: |
            ha-card {
              border-radius: 24px !important;
              border: 1px solid var(--divider-color) !important;
              overflow: hidden !important;
            }

  - title: Chats
    path: cats
    icon: mdi:cat
    badges: []
    cards:
      - type: custom:auto-entities
        card:
          type: entities
          title: 🐱 Chats
          state_color: true
        filter:
          include:
            - domain: device_tracker
              integration: feelloo
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: entities
          title: 🔋 Batteries & 📡 Signaux
          state_color: true
        filter:
          include:
            - domain: sensor
              integration: feelloo
        sort:
          method: name
        exclude:
          - entity_id: '*activite*'
          - entity_id: '*repos*'
          - entity_id: '*calme*'
          - entity_id: '*actif*'
          - entity_id: '*sorties*'
          - entity_id: '*hebdo*'
          - entity_id: '*mensuel*'
          - entity_id: '*latitude*'
          - entity_id: '*longitude*'
          - entity_id: '*gps*'
          - entity_id: '*last_seen*'
          - entity_id: '*presence*'

      - type: custom:auto-entities
        card:
          type: entities
          title: 📊 Activités & Sorties
          state_color: true
        filter:
          include:
            - domain: sensor
              integration: feelloo
        sort:
          method: name
        exclude:
          - entity_id: '*batterie*'
          - entity_id: '*signal*'
          - entity_id: '*latitude*'
          - entity_id: '*longitude*'
          - entity_id: '*gps*'
          - entity_id: '*last_seen*'
          - entity_id: '*presence*'

      - type: custom:auto-entities
        card:
          type: entities
          title: 📍 Présence & ⚠️ Alertes
          state_color: true
        filter:
          include:
            - domain: binary_sensor
              integration: feelloo
        sort:
          method: name

      - type: custom:auto-entities
        card:
          type: entities
          title: 🐭 Petite Souris & 🔔 Actions
          state_color: true
        filter:
          include:
            - domain: switch
              integration: feelloo
            - domain: number
              integration: feelloo
            - domain: button
              integration: feelloo
        sort:
          method: name
